<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background for maskable icon support -->
  <rect width="512" height="512" fill="#0f172a" />
  
  <!-- Clipboard Group -->
  <g transform="translate(0, 0)">
    <!-- Main board frame -->
    <rect x="140" y="130" width="232" height="282" rx="24" fill="none" stroke="#f8fafc" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Board Header Clip -->
    <path d="M206 130 V100 C206 88 216 78 228 78 H284 C296 78 306 88 306 100 V130" fill="none" stroke="#3b82f6" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Ledger score lines -->
    <line x1="190" y1="210" x2="322" y2="210" stroke="#94a3b8" stroke-width="18" stroke-linecap="round" />
    <line x1="190" y1="270" x2="280" y2="270" stroke="#94a3b8" stroke-width="18" stroke-linecap="round" />
    <line x1="190" y1="330" x2="310" y2="330" stroke="#94a3b8" stroke-width="18" stroke-linecap="round" />
    
    <!-- Mini checkbox checks -->
    <path d="M190 270 M320 250 L330 260 L350 240" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
